query RunInput {
      cart {
        lines {
          id
          merchandise {
            __typename
            ...on ProductVariant
            {
              id
              product {
                productType
                hasAnyTag(tags: ["bulky"])
              }
            }
          }
        }
      }
      locations {
        id
        handle
        name
        metafield(namespace: "location", key: "name") {
          value
        }
      }
    }